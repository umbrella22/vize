name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format Rust
        run: cargo fmt --all -- --check

  check-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build vize CLI
        run: cargo build --release -p vize
      - name: Install vize CLI
        run: cp target/release/vize /usr/local/bin/vize
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true
      - name: Build JS packages
        run: vp run --workspace-root build:packages
      - name: Check JS/TS
        run: vp run --workspace-root check

  clippy-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Coverage report
        run: |
          cargo run -p vize_test_runner --bin coverage --release | tee coverage-report.txt
          echo ""
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          tail -7 coverage-report.txt >> $GITHUB_STEP_SUMMARY

  playground-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}

      # Rust is always needed for @vizejs/native (used by vite-plugin-vize)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Cache WASM build
        id: cache-wasm
        uses: actions/cache@v4
        with:
          path: playground/src/wasm
          key: ${{ runner.os }}-wasm-${{ hashFiles('crates/**/*.rs', 'Cargo.lock') }}

      - name: Install wasm-bindgen-cli
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.111

      - name: Build WASM
        if: steps.cache-wasm.outputs.cache-hit != 'true'
        run: |
          cargo build --release -p vize_vitrine --no-default-features --features wasm --target wasm32-unknown-unknown
          wasm-bindgen target/wasm32-unknown-unknown/release/vize_vitrine.wasm --out-dir playground/src/wasm --target web

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Build npm packages
        run: vp run --filter './npm/vize-native' --filter './npm/vite-plugin-vize' build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        run: |
          VITE_PLUS_PLAYWRIGHT_CLI="$(node <<'EOF'
          const path = require("node:path");

          const vitePlusDir = path.dirname(require.resolve("vite-plus/package.json"));
          const vitePlusTestDir = path.dirname(
            require.resolve("@voidzero-dev/vite-plus-test/package.json", { paths: [vitePlusDir] }),
          );
          const playwrightPkg = require.resolve("playwright/package.json", {
            paths: [vitePlusTestDir],
          });

          process.stdout.write(path.join(path.dirname(playwrightPkg), "cli.js"));
          EOF
          )"
          PLAYGROUND_PLAYWRIGHT_CLI="$(node <<'EOF'
          const path = require("node:path");

          const playgroundDir = path.resolve("playground");
          const playwrightPkg = require.resolve("playwright/package.json", {
            paths: [playgroundDir],
          });

          process.stdout.write(path.join(path.dirname(playwrightPkg), "cli.js"));
          EOF
          )"
          node "$VITE_PLUS_PLAYWRIGHT_CLI" install chromium --with-deps
          node "$PLAYGROUND_PLAYWRIGHT_CLI" install chromium

      - name: Run playground tests
        run: vp run --filter './playground' test:browser

      - name: Run VRT
        run: vp run --filter './playground' test:vrt
        continue-on-error: true
        id: vrt

      - name: Update VRT snapshots
        if: steps.vrt.outcome == 'failure'
        run: vp run --filter './playground' test:vrt:update

      - name: Commit updated snapshots
        if: steps.vrt.outcome == 'failure' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playground/e2e/vrt/__snapshots__/
          if git diff --cached --quiet; then
            echo "No snapshot changes"
          else
            git commit -m "chore: update VRT snapshots"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Fail if VRT failed and no auto-update
        if: steps.vrt.outcome == 'failure' && github.event_name != 'pull_request'
        run: exit 1

      - name: Upload VRT diff artifacts
        if: steps.vrt.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vrt-diff
          path: playground/e2e/vrt/test-results/
          retention-days: 7
