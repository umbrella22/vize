name: Deploy docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "napi"

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Build @vizejs/vite-plugin
        run: vp run --filter './npm/vize-native' --filter './npm/vite-plugin-vize' build

      - name: Build docs
        run: vp run --filter './docs' build

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/dist

  build-playground:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"
          shared-key: "wasm"

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.111

      - name: Build WASM
        run: |
          cargo build --release -p vize_vitrine --no-default-features --features wasm --target wasm32-unknown-unknown
          wasm-bindgen target/wasm32-unknown-unknown/release/vize_vitrine.wasm --out-dir npm/vize-wasm --target web
          wasm-bindgen target/wasm32-unknown-unknown/release/vize_vitrine.wasm --out-dir playground/src/wasm --target web

      - name: Setup Vite+ and Node.js
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: ".node-version"
          cache: true

      - name: Build npm packages
        run: vp run --filter './npm/vize-native' --filter './npm/vite-plugin-vize' --filter './npm/vite-plugin-musea' build

      - name: Build playground
        run: vp run --filter './playground' build

      - name: Build musea-examples
        run: vp run --filter './examples/vite-musea' build

      - name: Upload playground artifact
        uses: actions/upload-artifact@v4
        with:
          name: playground
          path: playground/dist

      - name: Upload musea-examples artifact
        uses: actions/upload-artifact@v4
        with:
          name: musea-examples
          path: examples/vite-musea/dist

  deploy:
    runs-on: ubuntu-latest
    needs: [build-docs, build-playground]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: playground/public/CNAME
          sparse-checkout-cone-mode: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create site structure
        run: |
          mkdir -p site/play site/musea-examples
          cp -r artifacts/docs/* site/
          cp -r artifacts/playground/* site/play/
          cp -r artifacts/musea-examples/* site/musea-examples/
          cp playground/public/CNAME site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
